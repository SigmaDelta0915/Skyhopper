<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sky Hopper</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: #70c5ce;
  }
  /* スマホ横向き時にプレイをブロックする案内オーバーレイ */
  #landscapeBlock {
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    color: #fff;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }
  #landscapeBlock .icon {
    width: 70px;
    height: 70px;
    border: 5px solid #fff;
    border-radius: 10px;
    margin-bottom: 24px;
    animation: rotateHint 1.6s ease-in-out infinite;
  }
  @keyframes rotateHint {
    0%   { transform: rotate(90deg); }
    50%  { transform: rotate(0deg); }
    100% { transform: rotate(0deg); }
  }
  #landscapeBlock p {
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
    margin: 0;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="landscapeBlock">
  <div class="icon"></div>
  <p>このゲームは縦画面専用です。<br>スマートフォンを縦向きにしてください。</p>
</div>

<script>
/* =========================================================
   ゲームバランス調整用変数（ここを編集して難易度を調整できます）
   ========================================================= */
const GRAVITY          = 0.45;   // 重力の強さ（大きいほど早く落下する）
const JUMP_STRENGTH     = -8.2;  // タップ時の浮き上がる力（絶対値が大きいほど高く飛ぶ）
const PIPE_SPEED        = 3.2;   // 障害物が左に流れる速度（大きいほど速く難しい）
const PIPE_SPAWN_RATE   = 105;   // 障害物が出現する間隔（フレーム数。小さいほど頻繁に出現）
const GAP_SIZE          = 190;   // 上下の障害物の隙間の広さ（小さいほど難しい）
/* ========================================================= */

const PIPE_WIDTH = 78;
const PLAYER_RADIUS_RATIO = 0.028; // 画面高さに対するプレイヤー半径の比率

/* =========================================================
   スマホ横向きブロック機能
   ========================================================= */
const PHONE_MAX_DIMENSION = 5000; // これ以下の画面サイズかつタッチ操作ならスマホ扱い（iPad等の大型タブレットは除外）

function isLikelyPhone() {
  const hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  const smallScreen = Math.max(window.innerWidth, window.innerHeight) <= PHONE_MAX_DIMENSION;
  return hasTouch && smallScreen;
}

function isBlockedLandscape() {
  return isLikelyPhone() && window.innerWidth > window.innerHeight;
}
/* ========================================================= */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const landscapeBlock = document.getElementById('landscapeBlock');

let W = 0, H = 0, DPR = 1;
let paused = false;

function resizeCanvas() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  checkLandscapeBlock();
}

function checkLandscapeBlock() {
  const blocked = isBlockedLandscape();
  landscapeBlock.style.display = blocked ? 'flex' : 'none';
  paused = blocked || document.hidden;
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', resizeCanvas);
resizeCanvas();

// ---------- ゲーム状態 ----------
const STATE = { TITLE: 'title', PLAYING: 'playing', GAMEOVER: 'gameover' };
let state = STATE.TITLE;

let score = 0;
let bestScore = 0;

let player = {};
let pipes = [];
let frame = 0;
let spawnTimer = 0;

let cloudOffset = 0;
let groundOffset = 0;

// パーティクル（衝突時の演出）
let particles = [];

function resetPlayer() {
  player = {
    x: W * 0.28,
    y: H * 0.5,
    vy: 0,
    r: H * PLAYER_RADIUS_RATIO,
    rotation: 0,
  };
}

function resetGame() {
  pipes = [];
  particles = [];
  score = 0;
  frame = 0;
  spawnTimer = 0;
  resetPlayer();
}

resetGame();

// ---------- 入力処理 ----------
function handleInput() {
  if (state === STATE.TITLE) {
    startGame();
  } else if (state === STATE.PLAYING) {
    jump();
  } else if (state === STATE.GAMEOVER) {
    // 少しの間は誤タップでの即リトライを防ぐ
    if (frame - gameOverFrame > 20) {
      startGame();
    }
  }
}

function jump() {
  player.vy = JUMP_STRENGTH;
}

let gameOverFrame = -999;

function startGame() {
  resetGame();
  state = STATE.PLAYING;
  // ② ゲームプレイ可能通知（必須）
  window.parent.postMessage({ type: 'gameReady' }, '*');
}

['pointerdown', 'touchstart'].forEach(evt => {
  window.addEventListener(evt, (e) => {
    e.preventDefault();
    if (isBlockedLandscape()) return;
    handleInput();
  }, { passive: false });
});
window.addEventListener('mousedown', (e) => {
  if (isBlockedLandscape()) return;
  handleInput();
});
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    if (isBlockedLandscape()) return;
    handleInput();
  }
});

// ---------- タブ切り替え時のポーズ処理 ----------
document.addEventListener('visibilitychange', () => {
  checkLandscapeBlock();
  if (!paused) {
    lastTime = performance.now();
  }
});

// ---------- 障害物生成 ----------
function spawnPipe() {
  const margin = H * 0.12;
  const minGapCenter = margin + GAP_SIZE / 2;
  const maxGapCenter = H - margin - GAP_SIZE / 2 - H * 0.08; // 地面分を差し引く
  const gapCenter = minGapCenter + Math.random() * Math.max(1, (maxGapCenter - minGapCenter));

  pipes.push({
    x: W + PIPE_WIDTH,
    gapCenter: gapCenter,
    passed: false,
    hue: 90 + Math.random() * 60 // 緑〜黄緑系のバリエーション
  });
}

function spawnParticles(x, y) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 15,
      maxLife: 30 + 15,
      color: `hsl(${Math.random() * 360}, 90%, 65%)`,
      size: 2 + Math.random() * 4
    });
  }
}

// ---------- 更新処理 ----------
const GROUND_HEIGHT_RATIO = 0.08;

function update() {
  frame++;
  cloudOffset -= 0.3;
  groundOffset -= PIPE_SPEED * (state === STATE.PLAYING ? 1 : 0.3);

  if (state === STATE.TITLE) {
    // タイトル画面ではふわふわ浮遊アニメーション
    player.y = H * 0.5 + Math.sin(frame * 0.05) * (H * 0.03);
    return;
  }

  if (state === STATE.GAMEOVER) {
    // ゲームオーバー後もパーティクルだけ更新
    updateParticles();
    return;
  }

  // ---- PLAYING ----
  player.vy += GRAVITY;
  player.y += player.vy;
  player.rotation = Math.max(-0.5, Math.min(1.2, player.vy * 0.06));

  const groundY = H * (1 - GROUND_HEIGHT_RATIO);

  // 天井・床との衝突
  if (player.y - player.r < 0) {
    player.y = player.r;
    player.vy = 0;
    triggerGameOver();
  }
  if (player.y + player.r > groundY) {
    player.y = groundY - player.r;
    triggerGameOver();
  }

  // 障害物生成
  spawnTimer++;
  if (spawnTimer >= PIPE_SPAWN_RATE) {
    spawnTimer = 0;
    spawnPipe();
  }

  // 障害物の移動と判定
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;

    // スコア加算
    if (!p.passed && p.x + PIPE_WIDTH < player.x) {
      p.passed = true;
      score++;
      if (score > bestScore) bestScore = score;
    }

    // 衝突判定
    const topH = p.gapCenter - GAP_SIZE / 2;
    const bottomY = p.gapCenter + GAP_SIZE / 2;
    const withinX = player.x + player.r > p.x && player.x - player.r < p.x + PIPE_WIDTH;
    if (withinX) {
      const hitTop = player.y - player.r < topH;
      const hitBottom = player.y + player.r > bottomY;
      if (hitTop || hitBottom) {
        triggerGameOver();
      }
    }

    if (p.x + PIPE_WIDTH < -10) {
      pipes.splice(i, 1);
    }
  }

  updateParticles();
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vy += 0.15;
    pt.life--;
    if (pt.life <= 0) particles.splice(i, 1);
  }
}

function triggerGameOver() {
  if (state === STATE.GAMEOVER) return;
  state = STATE.GAMEOVER;
  gameOverFrame = frame;
  spawnParticles(player.x, player.y);
  // ③ スコア送信（必須）
  window.parent.postMessage({ type: 'sendScore', score: score }, '*');
}

// ---------- 描画処理 ----------
function drawBackground() {
  // 空のグラデーション
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#4ec0e9');
  grad.addColorStop(1, '#a7e6f2');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 雲
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 5; i++) {
    const baseX = ((i * 220 + cloudOffset) % (W + 300)) - 150;
    const baseY = H * (0.1 + (i % 3) * 0.12);
    drawCloud(baseX, baseY, 45 + (i % 3) * 12);
  }
}

function drawCloud(x, y, size) {
  ctx.beginPath();
  ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
  ctx.arc(x + size * 0.5, y - size * 0.15, size * 0.4, 0, Math.PI * 2);
  ctx.arc(x + size * 0.9, y, size * 0.45, 0, Math.PI * 2);
  ctx.arc(x + size * 0.45, y + size * 0.1, size * 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  const groundY = H * (1 - GROUND_HEIGHT_RATIO);
  const grad = ctx.createLinearGradient(0, groundY, 0, H);
  grad.addColorStop(0, '#deb887');
  grad.addColorStop(1, '#c19a6b');
  ctx.fillStyle = grad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // ストライプ模様（動く）
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  const stripeW = 40;
  let gx = groundOffset % stripeW;
  if (gx > 0) gx -= stripeW;
  for (let x = gx; x < W; x += stripeW) {
    ctx.fillRect(x, groundY, stripeW / 2, H - groundY);
  }

  ctx.fillStyle = '#8bc34a';
  ctx.fillRect(0, groundY - 6, W, 6);
}

function drawPipe(p) {
  const topH = p.gapCenter - GAP_SIZE / 2;
  const bottomY = p.gapCenter + GAP_SIZE / 2;
  const groundY = H * (1 - GROUND_HEIGHT_RATIO);

  // 上パイプ
  drawPipeSegment(p.x, 0, PIPE_WIDTH, topH, p.hue, true);
  // 下パイプ
  drawPipeSegment(p.x, bottomY, PIPE_WIDTH, groundY - bottomY, p.hue, false);
}

function drawPipeSegment(x, y, w, h, hue, isTop) {
  if (h <= 0) return;
  const bodyGrad = ctx.createLinearGradient(x, 0, x + w, 0);
  bodyGrad.addColorStop(0, `hsl(${hue}, 65%, 42%)`);
  bodyGrad.addColorStop(0.5, `hsl(${hue}, 70%, 58%)`);
  bodyGrad.addColorStop(1, `hsl(${hue}, 65%, 38%)`);

  ctx.fillStyle = bodyGrad;
  roundRect(x, y, w, h, 8);
  ctx.fill();

  // 縁の帽子部分
  const capH = Math.min(28, h);
  const capY = isTop ? y + h - capH : y;
  ctx.fillStyle = `hsl(${hue}, 60%, 35%)`;
  roundRect(x - 6, capY, w + 12, capH, 8);
  ctx.fill();

  ctx.strokeStyle = `hsl(${hue}, 70%, 30%)`;
  ctx.lineWidth = 3;
  roundRect(x - 6, capY, w + 12, capH, 8);
  ctx.stroke();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.rotation);

  // 影
  ctx.beginPath();
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.ellipse(0, player.r * 0.9, player.r * 0.9, player.r * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // 本体
  const bodyGrad = ctx.createRadialGradient(-player.r * 0.3, -player.r * 0.3, player.r * 0.1, 0, 0, player.r);
  bodyGrad.addColorStop(0, '#fff176');
  bodyGrad.addColorStop(1, '#fbc02d');
  ctx.beginPath();
  ctx.fillStyle = bodyGrad;
  ctx.arc(0, 0, player.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = '#e65100';
  ctx.stroke();

  // 翼
  ctx.beginPath();
  ctx.fillStyle = '#ffe082';
  ctx.ellipse(-player.r * 0.2, player.r * 0.1, player.r * 0.7, player.r * 0.4, Math.sin(frame * 0.3) * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#e65100';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 目
  ctx.beginPath();
  ctx.fillStyle = '#fff';
  ctx.arc(player.r * 0.35, -player.r * 0.25, player.r * 0.32, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.fillStyle = '#333';
  ctx.arc(player.r * 0.45, -player.r * 0.25, player.r * 0.15, 0, Math.PI * 2);
  ctx.fill();

  // くちばし
  ctx.beginPath();
  ctx.fillStyle = '#ff7043';
  ctx.moveTo(player.r * 0.7, 0);
  ctx.lineTo(player.r * 1.25, player.r * 0.12);
  ctx.lineTo(player.r * 0.7, player.r * 0.35);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(pt => {
    ctx.globalAlpha = Math.max(0, pt.life / pt.maxLife);
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawScore() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${Math.floor(H * 0.07)}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.lineWidth = Math.max(3, H * 0.01);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.fillStyle = '#fff';
  const y = H * 0.14;
  ctx.strokeText(score, W / 2, y);
  ctx.fillText(score, W / 2, y);
  ctx.restore();
}

function drawRoundedPanel(x, y, w, h, r) {
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  roundRect(x, y, w, h, r);
  ctx.fill();
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#ffb300';
  roundRect(x, y, w, h, r);
  ctx.stroke();
}

function drawTitleScreen() {
  const panelW = Math.min(W * 0.8, 420);
  const panelH = H * 0.42;
  const panelX = W / 2 - panelW / 2;
  const panelY = H * 0.18;

  drawRoundedPanel(panelX, panelY, panelW, panelH, 24);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#333';
  ctx.font = `bold ${Math.floor(H * 0.055)}px Arial, sans-serif`;
  ctx.fillText('SKY HOPPER', W / 2, panelY + panelH * 0.28);

  ctx.font = `${Math.floor(H * 0.028)}px Arial, sans-serif`;
  ctx.fillStyle = '#666';
  ctx.fillText('タップして障害物を避けよう！', W / 2, panelY + panelH * 0.46);

  // ベストスコア
  ctx.font = `bold ${Math.floor(H * 0.03)}px Arial, sans-serif`;
  ctx.fillStyle = '#ff9800';
  ctx.fillText('BEST: ' + bestScore, W / 2, panelY + panelH * 0.6);

  // STARTボタン
  const btnW = panelW * 0.6;
  const btnH = panelH * 0.22;
  const btnX = W / 2 - btnW / 2;
  const btnY = panelY + panelH * 0.72;
  const pulse = 1 + Math.sin(frame * 0.08) * 0.03;

  ctx.save();
  ctx.translate(W / 2, btnY + btnH / 2);
  ctx.scale(pulse, pulse);
  ctx.translate(-(W / 2), -(btnY + btnH / 2));

  const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#66bb6a');
  btnGrad.addColorStop(1, '#388e3c');
  ctx.fillStyle = btnGrad;
  roundRect(btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.floor(H * 0.035)}px Arial, sans-serif`;
  ctx.fillText('START', W / 2, btnY + btnH * 0.66);
  ctx.restore();
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);

  const panelW = Math.min(W * 0.82, 440);
  const panelH = H * 0.46;
  const panelX = W / 2 - panelW / 2;
  const panelY = H * 0.24;

  drawRoundedPanel(panelX, panelY, panelW, panelH, 24);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e53935';
  ctx.font = `bold ${Math.floor(H * 0.05)}px Arial, sans-serif`;
  ctx.fillText('GAME OVER', W / 2, panelY + panelH * 0.24);

  ctx.fillStyle = '#333';
  ctx.font = `${Math.floor(H * 0.03)}px Arial, sans-serif`;
  ctx.fillText('SCORE', W / 2, panelY + panelH * 0.42);

  ctx.font = `bold ${Math.floor(H * 0.07)}px Arial, sans-serif`;
  ctx.fillStyle = '#ff9800';
  ctx.fillText(score, W / 2, panelY + panelH * 0.58);

  ctx.font = `${Math.floor(H * 0.026)}px Arial, sans-serif`;
  ctx.fillStyle = '#777';
  ctx.fillText('BEST: ' + bestScore, W / 2, panelY + panelH * 0.7);

  // リトライボタン
  const btnW = panelW * 0.65;
  const btnH = panelH * 0.2;
  const btnX = W / 2 - btnW / 2;
  const btnY = panelY + panelH * 0.78;

  const ready = frame - gameOverFrame > 20;
  const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  if (ready) {
    btnGrad.addColorStop(0, '#42a5f5');
    btnGrad.addColorStop(1, '#1565c0');
  } else {
    btnGrad.addColorStop(0, '#b0bec5');
    btnGrad.addColorStop(1, '#90a4ae');
  }
  ctx.fillStyle = btnGrad;
  roundRect(btnX, btnY, btnW, btnH, btnH / 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.floor(H * 0.03)}px Arial, sans-serif`;
  ctx.fillText('TAP TO RETRY', W / 2, btnY + btnH * 0.65);
}

function draw() {
  drawBackground();

  pipes.forEach(drawPipe);
  drawGround();
  drawParticles();
  drawPlayer();

  if (state === STATE.PLAYING) {
    drawScore();
  } else if (state === STATE.TITLE) {
    drawTitleScreen();
  } else if (state === STATE.GAMEOVER) {
    drawScore();
    drawGameOverScreen();
  }
}

// ---------- メインループ ----------
let lastTime = performance.now();
const TARGET_STEP = 1000 / 60;

function loop(now) {
  requestAnimationFrame(loop);

  if (paused) {
    lastTime = now;
    return;
  }

  const delta = now - lastTime;
  if (delta < TARGET_STEP - 2) return; // フレームレート概ね60fpsに固定
  lastTime = now;

  update();
  draw();
}

// ---------- 起動処理 ----------
function init() {
  checkLandscapeBlock();
  draw();
  // ① SDKの初期化完了通知（必須）
  window.parent.postMessage({ type: 'firstFrameReady' }, '*');
  requestAnimationFrame(loop);
}

window.addEventListener('load', init);
</script>
</body>
</html>
